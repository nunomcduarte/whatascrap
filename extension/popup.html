<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        padding: 16px;
        width: 300px;
        background: #0f0f0f;
        color: #f5f5f5;
        font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      h1 {
        font-size: 12px;
        font-weight: 500;
        margin: 0 0 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        opacity: 0.5;
      }
      #empty,
      #notLoggedIn {
        font-size: 13px;
        line-height: 1.4;
        opacity: 0.7;
      }
      #notLoggedIn a { color: #ff8a8a; }
      #title {
        font-size: 14px;
        line-height: 1.35;
        margin-bottom: 6px;
        font-weight: 500;
      }
      #channel {
        font-size: 12px;
        opacity: 0.6;
        margin-bottom: 16px;
      }
      button {
        width: 100%;
        padding: 10px 14px;
        background: #cc2121;
        color: #fff;
        border: none;
        border-radius: 8px;
        font: inherit;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover:not(:disabled) { opacity: 0.92; }
      button:disabled { opacity: 0.6; cursor: default; }
      #status {
        margin-top: 12px;
        font-size: 13px;
        min-height: 1.2em;
        line-height: 1.3;
      }
      #status.ok { color: #6abd6a; }
      #status.err { color: #ff8a8a; }
    </style>
  </head>
  <body>
    <h1>WhatAScrap</h1>
    <div id="empty">Open a YouTube video to save it.</div>
    <div id="loaded" hidden>
      <div id="title"></div>
      <div id="channel"></div>
      <button id="save">+ Save to library</button>
      <div id="status"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
